<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#121212">
    <meta name="description" content="Controle de Compromissos e Contas a Pagar - PWA para gerenciar despesas com parcelamento inteligente">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Compromissos">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/icon-192x192.png">
    <title>Controle de Compromissos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-tertiary: #2a2a2a;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --accent: #00FF9D;
            --accent-dark: #00E89D;
            --danger: #FF4757;
            --border: #2a2a2a;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        /* Header com cards fixos */
        .header {
            position: sticky;
            top: 0;
            z-index: 40;
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            space-y: 1rem;
        }

        .header > * + * {
            margin-top: 1rem;
        }

        /* Card mestre */
        .card-master {
            background-color: var(--bg-secondary);
            border-radius: 0.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .card-master-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .card-master-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
        }

        /* Cards secundários */
        .cards-secondary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .card-secondary {
            background-color: var(--bg-secondary);
            border-radius: 0.5rem;
            padding: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .card-secondary-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
        }

        .card-secondary-value {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--text-primary);
        }

        /* Carrossel de filtros */
        .carousel-filters {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0.5rem 0;
            scroll-behavior: smooth;
        }

        .carousel-filters::-webkit-scrollbar {
            height: 4px;
        }

        .carousel-filters::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }

        .carousel-filters::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 2px;
        }

        .filter-btn {
            flex-shrink: 0;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            font-size: 0.875rem;
        }

        .filter-btn:hover {
            border-color: var(--accent);
        }

        .filter-btn.active {
            background-color: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        .filter-btn-amount {
            display: block;
            font-size: 0.75rem;
            opacity: 0.75;
        }

        /* Conteúdo principal */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        /* Abas */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .tab-button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
        }

        .tab-button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Lista de transações */
        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .transaction-item {
            background-color: var(--bg-secondary);
            border-radius: 0.5rem;
            padding: 1rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            transition: all 0.2s ease;
        }

        .transaction-item.paid {
            opacity: 0.6;
        }

        .transaction-item.paid .transaction-description {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .transaction-info {
            flex: 1;
            min-width: 0;
        }

        .transaction-description {
            font-weight: 500;
            color: var(--text-primary);
            word-break: break-word;
        }

        .transaction-details {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .transaction-amount {
            font-weight: bold;
            color: var(--accent);
            font-size: 1.125rem;
            min-width: max-content;
        }

        .transaction-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .transaction-btn.pay {
            background-color: var(--accent);
            color: var(--bg-primary);
        }

        .transaction-btn.pay:hover {
            background-color: var(--accent-dark);
        }

        .transaction-btn.paid {
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        /* Rodapé */
        .footer {
            border-top: 1px solid var(--border);
            background-color: var(--bg-secondary);
            padding: 1rem;
        }

        .footer-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: none;
            background-color: var(--accent);
            color: var(--bg-primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        .btn-primary:hover {
            background-color: var(--accent-dark);
            transform: scale(0.98);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .footer-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .btn-secondary {
            padding: 0.5rem;
            border-radius: 0.375rem;
            border: 1px solid var(--border);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.75rem;
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background-color: var(--bg-tertiary);
        }

        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 50;
            align-items: flex-end;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-secondary);
            width: 100%;
            border-radius: 1rem 1rem 0 0;
            padding: 1.5rem;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.875rem;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.375rem;
            border: 1px solid var(--border);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 255, 157, 0.1);
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .form-checkbox input {
            width: 1.25rem;
            height: 1.25rem;
            cursor: pointer;
            accent-color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .cards-secondary {
                grid-template-columns: 1fr;
            }

            .footer-actions {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header com cards fixos -->
        <div class="header">
            <div class="card-master">
                <div class="card-master-label">TOTAL COMPROMISSOS DO MÊS</div>
                <div class="card-master-value" id="totalCurrentMonth">R$ 0,00</div>
            </div>

            <div class="cards-secondary">
                <div class="card-secondary">
                    <div class="card-secondary-label">PRÓXIMO MÊS</div>
                    <div class="card-secondary-value" id="totalNextMonth">R$ 0,00</div>
                </div>
                <div class="card-secondary">
                    <div class="card-secondary-label">MÊS SUBSEQUENTE</div>
                    <div class="card-secondary-value" id="totalMonthAfterNext">R$ 0,00</div>
                </div>
            </div>

            <div class="carousel-filters" id="carouselFilters">
                <button class="filter-btn active" data-filter="all">
                    Todas
                </button>
            </div>
        </div>

        <!-- Conteúdo principal -->
        <div class="content">
            <div class="tabs">
                <button class="tab-button active" data-tab="pending">PENDENTES</button>
                <button class="tab-button" data-tab="paid">PAGAS</button>
                <button class="tab-button" data-tab="all">TUDO</button>
            </div>

            <div id="transactionList" class="transaction-list">
                <div class="empty-state">Nenhuma transação</div>
            </div>
        </div>

        <!-- Rodapé -->
        <div class="footer">
            <div class="footer-buttons">
                <button class="btn-primary" id="btnNewTransaction">+ NOVA CONTA</button>
                <div class="footer-actions">
                    <button class="btn-secondary" id="btnBackup">💾 Backup</button>
                    <button class="btn-secondary" id="btnRestore">📂 Restaurar</button>
                    <button class="btn-secondary btn-danger" id="btnClear">🗑️ Limpar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Nova Transação -->
    <div class="modal" id="modalNewTransaction">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('modalNewTransaction')">✕</button>
            <div class="modal-header">Novo Lançamento</div>

            <div class="form-group">
                <label class="form-label">Onde foi o gasto?</label>
                <select class="form-select" id="selectAccount">
                    <option value="">Selecione uma conta</option>
                </select>
                <button class="btn-secondary" style="width: 100%; margin-top: 0.5rem;" onclick="openModal('modalNewAccount')">+ Cadastrar Novo Cartão</button>
            </div>

            <div class="form-group">
                <label class="form-label">Descrição</label>
                <input type="text" class="form-input" id="inputDescription" placeholder="Ex: Compras no supermercado">
            </div>

            <div class="form-group">
                <label class="form-label">Valor Total</label>
                <input type="number" class="form-input" id="inputAmount" placeholder="0.00" step="0.01" min="0">
            </div>

            <div class="form-group">
                <label class="form-label">Parcelas</label>
                <select class="form-select" id="selectInstallments">
                    <option value="1">À vista</option>
                    <option value="2">2x</option>
                    <option value="3">3x</option>
                    <option value="4">4x</option>
                    <option value="5">5x</option>
                    <option value="6">6x</option>
                    <option value="7">7x</option>
                    <option value="8">8x</option>
                    <option value="9">9x</option>
                    <option value="10">10x</option>
                    <option value="11">11x</option>
                    <option value="12">12x</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Quem gastou?</label>
                <select class="form-select" id="selectPerson">
                    <option value="">Selecione uma pessoa</option>
                </select>
                <button class="btn-secondary" style="width: 100%; margin-top: 0.5rem;" onclick="openModal('modalNewPerson')">+ Cadastrar Nova Pessoa</button>
            </div>

            <div class="form-checkbox">
                <input type="checkbox" id="checkRecurring">
                <label for="checkRecurring">Conta Fixa (Mensal)</label>
            </div>

            <button class="btn-primary" onclick="createTransaction()" style="margin-top: 1rem;">Criar Lançamento</button>
        </div>
    </div>

    <!-- Modal de Nova Conta -->
    <div class="modal" id="modalNewAccount">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('modalNewAccount')">✕</button>
            <div class="modal-header">Novo Cartão/Conta</div>

            <div class="form-group">
                <label class="form-label">Nome</label>
                <input type="text" class="form-input" id="inputAccountName" placeholder="Ex: Visa Casas Bahia">
            </div>

            <div class="form-group">
                <label class="form-label">Dia de Fechamento</label>
                <input type="number" class="form-input" id="inputClosingDay" placeholder="25" min="1" max="31">
            </div>

            <div class="form-group">
                <label class="form-label">Dia de Vencimento</label>
                <input type="number" class="form-input" id="inputDueDay" placeholder="5" min="1" max="31">
            </div>

            <button class="btn-primary" onclick="createAccount()">Criar Conta</button>
        </div>
    </div>

    <!-- Modal de Nova Pessoa -->
    <div class="modal" id="modalNewPerson">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('modalNewPerson')">✕</button>
            <div class="modal-header">Nova Pessoa</div>

            <div class="form-group">
                <label class="form-label">Nome</label>
                <input type="text" class="form-input" id="inputPersonName" placeholder="Ex: João">
            </div>

            <button class="btn-primary" onclick="createPerson()">Adicionar Pessoa</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
