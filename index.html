<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121212">
    <meta name="description" content="Controle de Compromissos e Contas a Pagar">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Compromissos">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/icon-192x192.png">
    <title>Controle de Compromissos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-tertiary: #2a2a2a;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --accent: #00FF9D;
            --accent-dark: #00E89D;
            --danger: #FF4757;
            --border: #2a2a2a;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 100vh;
            padding-bottom: 120px; /* Espaço para o rodapé fixo não cobrir nada */
        }

        /* Topo Fixo */
        .header {
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
        }

        /* Layout de cards responsivo (evita quebrar no mobile) */
        .summary-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .card-box {
            background-color: var(--bg-secondary);
            border-radius: 0.75rem;
            padding: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .card-box.master {
            border-color: rgba(0, 255, 157, 0.3);
        }

        .card-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .card-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .card-box.master .card-value {
            font-size: 2rem;
            color: var(--accent);
        }

        /* Sub-grid para os dois cards menores ficarem lado a lado se couber */
        .sub-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        /* Filtros horizontais */
        .carousel-filters {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0.25rem 0;
            scrollbar-width: none;
        }

        .carousel-filters::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            flex-shrink: 0;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            border: 1px solid var(--border);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background-color: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        /* Listagem de contas */
        .content {
            padding: 1rem;
            flex: 1;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .tab-button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            border-bottom: 3px solid transparent;
            transition: all 0.2s ease;
        }

        .tab-button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .transaction-item {
            background-color: var(--bg-secondary);
            border-radius: 0.75rem;
            padding: 1rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .transaction-item.paid {
            opacity: 0.5;
        }

        .transaction-item.paid .transaction-description {
            text-decoration: line-through;
        }

        .transaction-info {
            flex: 1;
            min-width: 0;
        }

        .transaction-description {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 0.15rem;
        }

        .transaction-details {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .transaction-amount {
            font-weight: 700;
            color: var(--accent);
            font-size: 1.1rem;
        }

        .transaction-btn {
            padding: 0.5rem 0.8rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .transaction-btn.pay {
            background-color: var(--accent);
            color: var(--bg-primary);
        }

        .transaction-btn.paid {
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Rodapé Fixo e Colado Embaixo */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(8px);
            border-top: 1px solid var(--border);
            padding: 0.75rem 1rem calc(0.75rem + env(safe-area-inset-bottom));
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }

        .footer-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .btn-primary {
            width: 100%;
            padding: 0.85rem;
            border-radius: 0.75rem;
            border: none;
            background-color: var(--accent);
            color: var(--bg-primary);
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0, 255, 157, 0.2);
        }

        .footer-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.5rem;
        }

        .btn-secondary {
            padding: 0.5rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            text-align: center;
        }

        .btn-secondary.btn-danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Janelas Modais */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 200;
            align-items: flex-end;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-secondary);
            width: 100%;
            border-radius: 1.5rem 1.5rem 0 0;
            padding: 1.5rem;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            padding-right: 2rem;
        }

        .modal-close {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.25rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .form-input, .form-select {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .form-checkbox input {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: var(--accent);
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- Parte Superior do App -->
        <div class="header">
            <div class="summary-grid">
                <div class="card-box master">
                    <div class="card-label">Total do Mês Atual</div>
                    <div class="card-value" id="totalCurrentMonth">R$ 0,00</div>
                </div>
                <div class="sub-cards">
                    <div class="card-box">
                        <div class="card-label">Próximo Mês</div>
                        <div class="card-value" id="totalNextMonth">R$ 0,00</div>
                    </div>
                    <div class="card-box">
                        <div class="card-label">Subsequente</div>
                        <div class="card-value" id="totalMonthAfterNext">R$ 0,00</div>
                    </div>
                </div>
            </div>

            <!-- Filtros Rápidos -->
            <div class="carousel-filters" id="carouselFilters">
                <!-- Injetado via Javascript -->
            </div>
        </div>

        <!-- Conteúdo do Meio -->
        <div class="content">
            <div class="tabs">
                <button class="tab-button active" id="tabPending" onclick="switchTab('pending')">PENDENTES</button>
                <button class="tab-button" id="tabPaid" onclick="switchTab('paid')">PAGAS</button>
                <button class="tab-button" id="tabAll" onclick="switchTab('all')">TUDO</button>
            </div>

            <div id="transactionList" class="transaction-list">
                <div class="empty-state">Nenhuma transação cadastrada.</div>
            </div>
        </div>

        <!-- Menu de Ações Inferior -->
        <div class="footer">
            <div class="footer-buttons">
                <button class="btn-primary" id="btnOpenMainModal">+ NOVA CONTA</button>
                <div class="footer-actions">
                    <button class="btn-secondary" id="btnBackup">💾 Backup</button>
                    <button class="btn-secondary" id="btnRestore">📂 Restaurar</button>
                    <button class="btn-secondary btn-danger" id="btnClear">🗑️ Limpar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 1. MODAL PRINCIPAL: NOVO LANÇAMENTO -->
    <div class="modal" id="modalNewTransaction">
        <div class="modal-content">
            <button class="modal-close" id="btnCloseTxModal">✕</button>
            <div class="modal-header">Novo Lançamento</div>

            <div class="form-group">
                <label class="form-label">Onde foi o gasto? (Cartão/Conta)</label>
                <select class="form-select" id="selectAccount"></select>
                <button class="btn-secondary" style="width: 100%; margin-top: 0.5rem; padding: 0.6rem;" id="btnOpenAccModal">+ Cadastrar Novo Cartão</button>
            </div>

            <div class="form-group">
                <label class="form-label">Descrição do Gasto</label>
                <input type="text" class="form-input" id="inputDescription" placeholder="Ex: Mercado, Combustível...">
            </div>

            <div class="form-group">
                <label class="form-label">Valor Total</label>
                <input type="number" class="form-input" id="inputAmount" placeholder="0.00" step="0.01">
            </div>

            <div class="form-group">
                <label class="form-label">Quantidade de Parcelas</label>
                <select class="form-select" id="selectInstallments">
                    <option value="1">À vista</option>
                    <option value="2">2x</option><option value="3">3x</option>
                    <option value="4">4x</option><option value="5">5x</option>
                    <option value="6">6x</option><option value="7">7x</option>
                    <option value="8">8x</option><option value="9">9x</option>
                    <option value="10">10x</option><option value="11">11x</option>
                    <option value="12">12x</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Quem gastou?</label>
                <select class="form-select" id="selectPerson"></select>
                <button class="btn-secondary" style="width: 100%; margin-top: 0.5rem; padding: 0.6rem;" id="btnOpenPerModal">+ Cadastrar Nova Pessoa</button>
            </div>

            <div class="form-checkbox">
                <input type="checkbox" id="checkRecurring">
                <label for="checkRecurring">Conta Fixa Todo Mês</label>
            </div>

            <button class="btn-primary" id="btnSubmitTransaction" style="margin-top: 0.5rem;">Salvar Lançamento</button>
        </div>
    </div>

    <!-- 2. MODAL NOVO CARTÃO -->
    <div class="modal" id="modalNewAccount">
        <div class="modal-content">
            <button class="modal-close" id="btnCloseAccModal">✕</button>
            <div class="modal-header">Cadastrar Cartão ou Conta</div>

            <div class="form-group">
                <label class="form-label">Nome do Cartão/Banco</label>
                <input type="text" class="input-field form-input" id="inputAccountName" placeholder="Ex: Nubank Daniela, Visa">
            </div>

            <div class="form-group">
                <label class="form-label">Dia de Fechamento da Fatura</label>
                <input type="number" class="form-input" id="inputClosingDay" placeholder="Ex: 25" min="1" max="31">
            </div>

            <div class="form-group">
                <label class="form-label">Dia de Vencimento da Fatura</label>
                <input type="number" class="form-input" id="inputDueDay" placeholder="Ex: 5" min="1" max="31">
            </div>

            <button class="btn-primary" id="btnSubmitAccount">Criar Cartão</button>
        </div>
    </div>

    <!-- 3. MODAL NOVA PESSOA -->
    <div class="modal" id="modalNewPerson">
        <div class="modal-content">
            <button class="modal-close" id="btnClosePerModal">✕</button>
            <div class="modal-header">Adicionar Nova Pessoa</div>

            <div class="form-group">
                <label class="form-label">Nome da Pessoa</label>
                <input type="text" class="input-field form-input" id="inputPersonName" placeholder="Ex: Rogério, Isabelli">
            </div>

            <button class="btn-primary" id="btnSubmitPerson">Adicionar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
