<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro Doméstico</title>
    <!-- Vinculando o arquivo de design unificado -->
    <link rel="stylesheet" href="Estilos.css">
    <!-- Configuração para o PWA (Manifest) -->
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <!-- TOPO DO APP: Seletor de Meses e Indicadores Gerais -->
    <header class="topo-app">
        <div class="seletor-mes">
            <button id="btn-mes-anterior">&lt;</button>
            <span id="mes-atual">JUNHO 2026</span>
            <button id="btn-mes-proximo">&gt;</button>
        </div>
        <div class="resumo-geral">
            <span class="label-total">Total Geral do Mês</span>
            <div class="valor-total" id="total-geral-mes">R$ 0,00</div>
        </div>
    </header>

    <main class="conteudo-principal">
        
        <!-- ABA 1: PAINEL DO MÊS (Home) -->
        <section id="aba-painel" class="secao-aba">
            <h2>Prioridades a Vencer</h2>
            <div id="lista-prioridades" class="lista-contas">
                <!-- O arquivo Telas.js e Historico.js vão injetar as contas aqui -->
            </div>
            
            <h2>Faturas de Cartões</h2>
            <div id="lista-faturas-cartoes" class="lista-cartoes">
                <!-- O arquivo CalculoFinanceiro.js vai injetar os totais de faturas aqui -->
            </div>
        </section>

        <!-- ABA 2: RESUMO POR RESPONSÁVEL (O Rateio) -->
        <section id="aba-rateio" class="secao-aba aba-escondida">
            <h2>Resumo por Responsável</h2>
            <div class="grade-responsaveis" id="grade-rateio">
                <!-- Os blocos visuais de cada pessoa vão nascer aqui via código -->
            </div>
        </section>

    </main>

    <!-- GAVETA (MODAL) DINÂMICA DE LANÇAMENTO -->
    <!-- Essa estrutura serve para Novo Lançamento ou para as sub-gavetas de seleção -->
    <div id="gaveta-lancamento" class="gaveta-container escondida">
        <div class="gaveta-conteudo">
            <div class="gaveta-topo">
                <h3 id="titulo-gaveta">Novo Lançamento</h3>
                <button id="fechar-gaveta" class="btn-fechar">&times;</button>
            </div>
            <div id="corpo-gaveta">
                <!-- O arquivo Telas.js vai desenhar dinamicamente os campos aqui -->
            </div>
        </div>
    </div>

    <!-- BARRA DE NAVEGAÇÃO INFERIOR -->
    <nav class="barra-navegacao">
        <button class="nav-item ativo" data-aba="aba-painel">
            <span class="icone">📅</span>
            <span class="texto">Painel</span>
        </button>
        <button class="nav-item-central" id="btn-abrir-lancamento">
            <span class="icone-mais">+</span>
        </button>
        <button class="nav-item" data-aba="aba-rateio">
            <span class="icone">👥</span>
            <span class="texto">Rateio</span>
        </button>
    </nav>

    <!-- ========================================== -->
    <!-- CARREGAMENTO DOS SCRIPTS ESPECÍFICOS       -->
    <!-- ========================================== -->
    <!-- Primeiro carregamos os dados e a segurança -->
    <script src="Cadastros.js"></script>
    <script src="Backup.js"></script>
    
    <!-- Depois o motor de cálculos matemático -->
    <script src="CalculoFinanceiro.js"></script>
    
    <!-- Por fim, os arquivos que controlam o que aparece na tela -->
    <script src="Historico.js"></script>
    <script src="Telas.js"></script>
</body>
</html>
