<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/icon-192x192.png">
    <title>Controle de Compromissos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-tertiary: #2a2a2a;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --accent: #00FF9D;
            --danger: #FF4757;
            --border: #2a2a2a;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 100vh;
            padding-bottom: 140px;
        }

        .header {
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 1rem;
        }

        /* Card Master Centralizado */
        .card-box.master {
            background-color: var(--bg-secondary);
            border-radius: 0.75rem;
            padding: 1.25rem;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 157, 0.2);
            text-align: center;
            margin-bottom: 1rem;
        }

        .card-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.35rem;
        }

        .card-value-master {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent);
        }

        /* Sub-cards da Tela Inicial */
        .sub-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .card-box-small {
            background-color: var(--bg-secondary);
            border-radius: 0.75rem;
            padding: 0.85rem;
            border: 1px solid var(--border);
            text-align: center;
        }

        .card-value-small {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 0.15rem;
        }

        /* Seção de Balões de Pessoas (Estilo Cofrinho) */
        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .people-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .person-balloon {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .person-balloon:active {
            transform: scale(0.98);
        }

        .person-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .person-amount {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 0.2rem;
        }

        /* Abas e Conteúdo do Meio */
        .content {
            padding: 1rem;
            flex: 1;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .tab-button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            border-bottom: 3px solid transparent;
        }

        .tab-button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Lista Principal Resumida */
        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .transaction-item {
            background-color: var(--bg-secondary);
            border-radius: 0.75rem;
            padding: 1rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .transaction-info {
            flex: 1;
            min-width: 0;
        }

        .transaction-description {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .transaction-details {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.15rem;
        }

        .transaction-amount {
            font-weight: 700;
            color: var(--accent);
            font-size: 1.05rem;
        }

        .transaction-btn {
            padding: 0.45rem 0.75rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .transaction-btn.pay { background-color: var(--accent); color: var(--bg-primary); }
        .transaction-btn.paid { background-color: var(--bg-tertiary); color: var(--text-secondary); }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Rodapé de Ações Fixo */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(30, 30, 30, 0.96);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            padding: 0.75rem 1rem calc(0.75rem + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .footer-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .btn-primary {
            width: 100%;
            padding: 0.85rem;
            border-radius: 0.75rem;
            border: none;
            background-color: var(--accent);
            color: var(--bg-primary);
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        .footer-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .btn-secondary {
            padding: 0.55rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            text-align: center;
        }
        .btn-secondary.btn-danger { border-color: var(--danger); color: var(--danger); }

        /* Estilo dos Modais */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 200;
            align-items: flex-end;
        }

        .modal-content {
            background-color: var(--bg-secondary);
            width: 100%;
            border-radius: 1.25rem 1.25rem 0 0;
            padding: 1.5rem;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
        }

        .modal-close {
            position: absolute;
            top: 1.25rem; right: 1.25rem;
            background: none; border: none;
            color: var(--text-secondary);
            font-size: 1.25rem; cursor: pointer;
        }

        /* Formulários */
        .type-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .type-btn {
            padding: 0.65rem;
            border: 1px solid var(--border);
            background-color: var(--bg-primary);
            color: var(--text-secondary);
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .type-btn.active {
            background-color: var(--bg-tertiary);
            color: var(--accent);
            border-color: var(--accent);
        }

        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; margin-bottom: 0.35rem; font-weight: 600; font-size: 0.8rem; color: var(--text-secondary); }
        .form-input, .form-select { width: 100%; padding: 0.7rem; border-radius: 0.5rem; border: 1px solid var(--border); background-color: var(--bg-primary); color: var(--text-primary); font-size: 0.95rem; }

        /* Lista Estilo Balão Interno (Histórico da Pessoa) */
        .history-item-row {
            border-bottom: 1px solid var(--border);
            padding: 0.85rem 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .history-action-btn {
            background: none; border: none; cursor: pointer; font-size: 0.9rem; padding: 0.25rem; margin-left: 0.5rem;
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- Topo Principal Fixo -->
        <div class="header">
            <div class="card-box master">
                <div class="card-label">Total do Mês Atual</div>
                <div class="card-value-master" id="totalCurrentMonth">R$ 0,00</div>
            </div>
            
            <div class="sub-cards">
                <div class="card-box-small">
                    <div class="card-label">Próximo Mês</div>
                    <div class="card-value-small" id="totalNextMonth">R$ 0,00</div>
                </div>
                <div class="card-box-small">
                    <div class="card-label">Subsequente</div>
                    <div class="card-value-small" id="totalMonthAfterNext">R$ 0,00</div>
                </div>
            </div>

            <!-- Balões Resumo de Pessoas -->
            <div class="section-title">Resumo por Responsável</div>
            <div class="people-grid" id="peopleBalloonsBox">
                <!-- Injetado via Javascript -->
            </div>
        </div>

        <!-- Conteúdo de Listagem Geral -->
        <div class="content">
            <div class="tabs">
                <button class="tab-button active" id="tabPending" onclick="switchTab('pending')">PENDENTES</button>
                <button class="tab-button" id="tabPaid" onclick="switchTab('paid')">PAGAS</button>
                <button class="tab-button" id="tabAll" onclick="switchTab('all')">TUDO</button>
            </div>

            <div id="transactionList" class="transaction-list">
                <!-- Injetado via Javascript -->
            </div>
        </div>

        <!-- Menu de Ações Inferior -->
        <div class="footer">
            <div class="footer-buttons">
                <button class="btn-primary" id="btnOpenMainModal">+ NOVA CONTA</button>
                <div class="footer-actions">
                    <button class="btn-secondary" id="btnBackup">💾 Backup</button>
                    <button class="btn-secondary" id="btnRestore">📂 Restaurar</button>
                    <button class="btn-secondary btn-danger" id="btnClear">🗑️ Limpar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL 1: LANÇAMENTO INTELIGENTE -->
    <div class="modal" id="modalNewTransaction">
        <div class="modal-content">
            <button class="modal-close" id="btnCloseTxModal">✕</button>
            <div class="modal-header" id="txModalTitle">Novo Lançamento</div>
            <input type="hidden" id="inputEditTxId">

            <div class="type-selector">
                <button class="type-btn active" id="typeCartao" onclick="setFormType('cartao')">💳 Cartão de Crédito</button>
                <button class="type-btn" id="typeConsumo" onclick="setFormType('consumo')">📄 Conta de Consumo</button>
            </div>

            <div class="form-group" id="groupAccount">
                <label class="form-label">Qual o Cartão de Crédito?</label>
                <select class="form-select" id="selectAccount"></select>
                <button class="btn-secondary" style="width: 100%; margin-top: 0.4rem; padding: 0.45rem;" id="btnOpenAccModal">+ Cadastrar Novo Cartão</button>
            </div>

            <div class="form-group">
                <label class="form-label">Descrição do Gasto</label>
                <input type="text" class="form-input" id="inputDescription" placeholder="Ex: Mercado, Luz, Gasolina...">
            </div>

            <div class="form-group">
                <label class="form-label">Valor do Lançamento</label>
                <input type="number" class="form-input" id="inputAmount" placeholder="0.00" step="0.01">
            </div>

            <div class="form-group" id="groupInstallments">
                <label class="form-label">Parcelamento</label>
                <select class="form-select" id="selectInstallments">
                    <option value="1">À vista</option>
                    <option value="2">2x</option><option value="3">3x</option>
                    <option value="4">4x</option><option value="5">5x</option>
                    <option value="6">6x</option><option value="7">7x</option>
                    <option value="8">8x</option><option value="9">9x</option>
                    <option value="10">10x</option><option value="11">11x</option>
                    <option value="12">12x</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Quem gastou / Responsável?</label>
                <select class="form-select" id="selectPerson"></select>
            </div>

            <button class="btn-primary" id="btnSubmitTransaction" style="margin-top: 0.5rem;">Salvar Lançamento</button>
        </div>
    </div>

    <!-- MODAL 2: HISTÓRICO ISOLADO DO BALÃO (ESTILO IMAGEM 4) -->
    <div class="modal" id="modalPersonHistory">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('modalPersonHistory')">✕</button>
            <div class="modal-header" id="personHistoryTitle">Detalhamento</div>
            
            <div id="personHistoryRows" style="margin-bottom: 1.5rem;">
                <!-- Linhas injetadas via JS -->
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; border-top: 2px solid var(--border); padding-top: 1rem;">
                <span style="font-weight: 700; color: var(--text-secondary);">TOTAL DO PERÍODO</span>
                <span id="personHistoryTotal" style="font-size: 1.4rem; font-weight: 800; color: var(--accent);">R$ 0,00</span>
            </div>
        </div>
    </div>

    <!-- MODAL 3: NOVO CARTÃO -->
    <div class="modal" id="modalNewAccount">
        <div class="modal-content">
            <button class="modal-close" id="btnCloseAccModal">✕</button>
            <div class="modal-header">Cadastrar Cartão</div>
            <div class="form-group">
                <label class="form-label">Nome do Cartão</label>
                <input type="text" class="form-input" id="inputAccountName" placeholder="Ex: Casas Bahia Visa">
            </div>
            <div class="form-group">
                <label class="form-label">Dia de Fechamento da Fatura</label>
                <input type="number" class="form-input" id="inputClosingDay" placeholder="25">
            </div>
            <div class="form-group">
                <label class="form-label">Dia de Vencimento da Fatura</label>
                <input type="number" class="form-input" id="inputDueDay" placeholder="5">
            </div>
            <button class="btn-primary" id="btnSubmitAccount">Criar Cartão</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
