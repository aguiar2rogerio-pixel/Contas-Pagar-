<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Compromissos</title>
    
    <!-- Configurações do PWA para Instalar no Celular -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#09090b">
    
    <!-- Tailwind CSS para o Visual Escuro Bonitão -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Registro do Service Worker (Para funcionar sem internet) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('Service Worker Ativo!'))
                .catch(err => console.log('Erro no SW:', err));
        }
    </script>
    
    <!-- O Cérebro Central (Apontando direto para a raiz) -->
    <script type="module" src="./app.js" defer></script>
</head>
<body class="bg-zinc-950 text-zinc-50 min-h-screen flex flex-col font-sans select-none">

    <header class="p-4 border-b border-zinc-800 bg-zinc-900/50 sticky top-0 backdrop-blur-md z-10">
        <h1 class="text-xl font-bold text-center tracking-wide">Meus Compromissos</h1>
    </header>

    <main class="flex-1 p-4 max-w-md mx-auto w-full space-y-6 pb-24">
        <!-- Os Balões de Rateio e Totais vão aparecer aqui dentro -->
        <div id="totais-container"></div>

        <!-- A Lista de Compromissos (As ~20 linhas do mês) vai aparecer aqui -->
        <div id="historico-container"></div>
    </main>

    <!-- Menu Inferior Fixo -->
    <nav class="fixed bottom-0 left-0 right-0 border-t border-zinc-800 bg-zinc-900/90 backdrop-blur-md p-3 flex justify-around items-center max-w-md mx-auto z-10">
        <button id="btn-pendentes" class="flex flex-col items-center text-emerald-500 font-medium">
            <span>📋</span><span class="text-xs mt-1">Pendentes</span>
        </button>
        <button id="btn-novo" class="bg-emerald-600 hover:bg-emerald-500 text-white p-3 rounded-full shadow-lg -mt-8 border-4 border-zinc-950 transition-all active:scale-95">
            <span class="text-xl font-bold">＋</span>
        </button>
        <button id="btn-pagas" class="flex flex-col items-center text-zinc-400 hover:text-zinc-200">
            <span>✅</span><span class="text-xs mt-1">Pagas</span>
        </button>
    </nav>

</body>
</html>
